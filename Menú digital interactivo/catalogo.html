<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Menú digital interactivo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg cafe-navbar">

            <div class="container">

                <!-- LOGO -->
                <a class="navbar-brand text-light fw-bold montserrat" href="/index.html">
                Smart Roast
                </a>

                <!-- MOBILE BUTTON -->
                <button 
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarCafe"
                >
                <span class="navbar-toggler-icon"></span>
                </button>

                <!-- NAVBAR CONTENT -->
                <div class="collapse navbar-collapse" id="navbarCafe">

                <!-- LINKS -->
                <div class="navbar-nav mx-auto">

                    <a class="nav-link active text-light montserrat" href="/index.html">
                    Inicio
                    </a>

                    <a class="nav-link text-light montserrat" href="/catalogo.html">
                    Catálogo
                    </a>

                </div>

                <!-- CART -->
                <a 
                    href="/carrito.html"
                    class="btn cart-btn position-relative"
                >

                    <i class="bi bi-cart3 fs-4"></i>

                    <!-- BADGE -->
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle-prop badge rounded-pill"                    >
                    0
                    </span>

                </a>

                </div>
            </div>
        </nav>
    </header>
    <main>


        <h1>Página del Catálogo</h1>

        <div class="container">
            <div class="row row-cols-1 row-cols-md-4 g-4 mt-1 justify-content-center">
            <a href="#" class="text-decoration-none">
                <div class="col">
                    <div class="card h-100 shadow-sm card-custom card-hover">
                        <div class="text-center p-3">
                            <img src="https://picsum.photos/200/300" class="img-fluid img-fixed" alt="@item.Name">
                        </div>
                        <div class="card-body text-center d-flex flex-column">
                            <h6 class="card-title text-dark fw-bold title-fixed">Café Colombia</h6>
                            <div class="mt-auto">
                                <div class="price-section">
                                    <div>
                                        <small class="text-muted text-decoration-line-through fs-6">$1.699.999</small>
                                    </div>
                                    <div>
                                        <span class="text-success fw-bold fs-5">$1.529.999</span>
                                        <span class="badge bg-success ms-2">10% OFF</span>
                                    </div>
                                </div>
                                <div class="text-success fw-bold mt-2">Agregar al carrito</div>
                                
                            </div>
                        </div>
                    </div>
                </div>
            </a>
            </div>
            </div>





    </main>
    <footer>









    </footer>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="main.js"></script>    
</body>
</html>
